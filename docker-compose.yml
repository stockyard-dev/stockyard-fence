# docker-compose.yml for fence
# Quick start:
#   FENCE_ENCRYPTION_KEY=$(openssl rand -hex 32) docker compose up -d
#
# For production, set env vars in a .env file or your orchestrator secrets.
# Never commit real keys to version control.

services:
  fence:
    image: ghcr.io/stockyard-dev/stockyard-fence:latest
    # Or build locally:
    # build: .
    ports:
      - "8770:8770"
    environment:
      - PORT=${{STOCKYARD_PORT:-8770}}
      - DATA_DIR=${{STOCKYARD_DATA_DIR:-/data}}
      - FENCE_ADMIN_KEY=${{STOCKYARD_FENCE_ADMIN_KEY:-changeme}}
      - FENCE_ENCRYPTION_KEY=${{STOCKYARD_FENCE_ENCRYPTION_KEY:-}}
      - FENCE_LICENSE_KEY=${{STOCKYARD_FENCE_LICENSE_KEY:-}}
    volumes:
      - fence-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8770/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  fence-data:
    driver: local
